    type: hdmi
    label: "Input 3"
    routable_to_output_group: [main]
  - id: hdmi_in_4
    direction: input
    type: hdmi
    label: "Input 4"
    routable_to_output_group: [main]
  - id: hdmi_in_5
    direction: input
    type: hdmi
    label: "Input 5"
    routable_to_output_group: [main]
  - id: hdmi_in_6
    direction: input
    type: hdmi
    label: "Input 6"
    routable_to_output_group: [main]
  - id: hdmi_in_7
    direction: input
    type: hdmi
    label: "Input 7"
    routable_to_output_group: [main]
  - id: hdmi_in_8
    direction: input
    type: hdmi
    label: "Input 8"
